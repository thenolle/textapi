name: Bug report
description: Report a problem with TextAPI
title: "[BUG] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened and what you expected.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run /text parse ...
        2. ...
        3. Error occurs
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stacktrace
      render: shell

  - type: input
    id: version
    attributes:
      label: TextAPI version
      placeholder: 1.0.2

  - type: input
    id: mcversion
    attributes:
      label: Minecraft version
      placeholder: 1.21.x
